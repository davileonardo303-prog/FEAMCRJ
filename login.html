<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal do Filiado - FEAMCRJ</title>
  
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    h1, h2, h3, .font-display {
      font-family: 'Space Grotesk', sans-serif;
    }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen flex flex-col justify-between selection:bg-amber-500 selection:text-zinc-950">

  <!-- Header Dinâmico -->
  <div id="header-container"></div>

  <!-- CONTEÚDO PRINCIPAL -->
  <main class="flex-grow py-16 px-4 sm:px-6 lg:px-8 flex items-center justify-center">
    <div class="max-w-md w-full space-y-8">
      
      <!-- Page Header -->
      <div class="text-center space-y-2">
        <span class="text-xs font-bold uppercase tracking-widest text-amber-500">ÁREA RESTRITA</span>
        <h1 class="text-3xl font-black uppercase tracking-tight text-white leading-none">
          Portal do Filiado
        </h1>
        <p class="text-zinc-500 text-xs">
          Acesse sua carteira digital, inscrições de torneios e histórico técnico.
        </p>
      </div>

      <!-- Login Card -->
      <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-6 sm:p-8 shadow-xl relative overflow-hidden">
        
        <!-- Abas de Tipo de Login (Opção Aluno, Professor, ADM) -->
        <div class="flex p-1 bg-zinc-950 border border-zinc-850 rounded-xl mb-6">
          <button type="button" onclick="setRole('atleta')" id="tab-atleta" class="flex-1 py-2 text-[11px] font-black uppercase tracking-wider rounded-lg text-amber-500 bg-zinc-900 border border-zinc-850/40 transition-all cursor-pointer">
            Aluno / Atleta
          </button>
          <button type="button" onclick="setRole('professor')" id="tab-professor" class="flex-1 py-2 text-[11px] font-black uppercase tracking-wider rounded-lg text-zinc-400 hover:text-white transition-all cursor-pointer">
            Professor / CT
          </button>
          <button type="button" onclick="setRole('admin')" id="tab-admin" class="flex-1 py-2 text-[11px] font-black uppercase tracking-wider rounded-lg text-zinc-400 hover:text-white transition-all cursor-pointer">
            ADM / FEAM
          </button>
        </div>

        <form id="login-form" class="space-y-5">
          
          <!-- E-mail -->
          <div>
            <label id="email-label" class="block text-xs font-bold text-zinc-400 uppercase tracking-wider mb-2">Seu E-mail de Atleta</label>
            <input type="email" id="email" required class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-amber-500 transition-colors" placeholder="Ex: atleta@gmail.com">
          </div>

          <!-- Senha -->
          <div>
            <div class="flex items-center justify-between mb-2">
              <label class="block text-xs font-bold text-zinc-400 uppercase tracking-wider">Sua Senha</label>
              <a href="#" onclick="triggerPasswordRecovery(); return false;" class="text-[10px] text-amber-500 hover:underline">Esqueceu a senha?</a>
            </div>
            <input type="password" id="password" required class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-amber-500 transition-colors" placeholder="••••••••">
          </div>

          <!-- Dica de Demonstração Interativa -->
          <div id="demo-helper" class="bg-zinc-950 border border-zinc-850/60 rounded-xl p-3.5 text-center transition-all">
            <p id="demo-text" class="text-[11px] text-zinc-400 font-medium">Acesso para atletas filiados visualizarem carteirinha digital e histórico.</p>
            <button type="button" id="demo-btn" onclick="fillDemoCredentials()" class="hidden mt-2 mx-auto px-3 py-1.5 bg-amber-500/10 hover:bg-amber-500/20 text-amber-500 text-[10px] font-black uppercase tracking-widest rounded border border-amber-500/20 transition-all cursor-pointer">
              Preencher dados de teste
            </button>
          </div>

          <!-- Submit Button -->
          <button type="submit" id="submit-btn" class="w-full py-4 rounded-xl bg-gradient-to-r from-red-600 to-amber-500 text-sm font-black uppercase tracking-widest hover:from-red-500 hover:to-amber-400 shadow-md shadow-amber-950/20 transition-all cursor-pointer">
            Entrar como Atleta
          </button>

          <div class="text-center mt-4 space-y-2">
            <p class="text-xs text-zinc-500">Ainda não possui cadastro de filiação?</p>
            <div class="flex justify-center space-x-4">
              <a href="cadastro-atleta.html" class="text-xs text-amber-500 hover:underline font-bold">Filie-se como Atleta</a>
              <span class="text-zinc-800">|</span>
              <a href="cadastro-professor.html" class="text-xs text-amber-500 hover:underline font-bold">Credencie sua Academia</a>
            </div>
          </div>

        </form>

      </div>
    </div>
  </main>

  <!-- Footer Dinâmico -->
  <div id="footer-container"></div>

  <!-- Scripts Globais -->
  <script src="firebase-config.js"></script>
  <script src="components.js"></script>

  <!-- Lógica de Autenticação -->
  <script>
    let currentRole = 'atleta';

    // Se o usuário já estiver logado, manda direto para o painel
    if (localStorage.getItem('feamcrj_logged_user')) {
      window.location.href = 'painel.html';
    }

    function setRole(role) {
      currentRole = role;
      
      // Reset classes
      const tabs = ['atleta', 'professor', 'admin'];
      tabs.forEach(t => {
        const btn = document.getElementById(`tab-${t}`);
        if (t === role) {
          btn.className = "flex-1 py-2 text-[11px] font-black uppercase tracking-wider rounded-lg text-amber-500 bg-zinc-900 border border-zinc-850/40 transition-all cursor-pointer";
        } else {
          btn.className = "flex-1 py-2 text-[11px] font-black uppercase tracking-wider rounded-lg text-zinc-400 hover:text-white transition-all cursor-pointer";
        }
      });

      // Update Labels, Placeholders, Helpers & Buttons
      const emailLabel = document.getElementById('email-label');
      const emailInput = document.getElementById('email');
      const demoText = document.getElementById('demo-text');
      const demoBtn = document.getElementById('demo-btn');
      const submitBtn = document.getElementById('submit-btn');

      if (role === 'atleta') {
        emailLabel.textContent = "Seu E-mail de Atleta";
        emailInput.placeholder = "Ex: atleta@gmail.com";
        demoText.textContent = "Acesso para atletas filiados verem carteirinha digital e histórico de faixas.";
        demoBtn.classList.add('hidden');
        submitBtn.textContent = "Entrar como Atleta";
      } else if (role === 'professor') {
        emailLabel.textContent = "E-mail do Professor / Academia";
        emailInput.placeholder = "Ex: academia@gmail.com";
        demoText.textContent = "Acesso exclusivo do professor credenciado para gerenciar seus atletas filiados.";
        demoBtn.classList.add('hidden');
        submitBtn.textContent = "Entrar como Professor";
      } else if (role === 'admin') {
        emailLabel.textContent = "E-mail de Administrador FEAM";
        emailInput.placeholder = "Ex: feamcrj@gmail.com";
        demoText.textContent = "Acesso exclusivo da diretoria da Federação para gestão global e homologações.";
        demoBtn.classList.remove('hidden');
        submitBtn.textContent = "Painel Administrativo";
      }
    }

    function fillDemoCredentials() {
      if (currentRole === 'admin') {
        document.getElementById('email').value = 'feamcrj@gmail.com';
        document.getElementById('password').value = 'Master582@';
      }
    }

    async function triggerPasswordRecovery() {
      const email = prompt("Digite seu e-mail cadastrado para receber as instruções de recuperação de senha:");
      if (!email || !email.trim()) return;
      
      try {
        const res = await recuperarSenha(email.trim());
        alert(res.message);
      } catch (error) {
        alert("Erro ao solicitar recuperação: " + error.message);
      }
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const pass = document.getElementById('password').value;

      try {
        const res = await loginFiliado(email, pass);
        if (res.success) {
          window.location.href = 'painel.html';
        }
      } catch (error) {
        alert('Erro no login: ' + error.message);
      }
    });
  </script>
</body>
</html>
